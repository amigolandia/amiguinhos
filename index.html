<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Teste de Conexão</h1>
    <button onclick="sendData()">Enviar Ping</button>
    <div id="status"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        function sendData() {
            const payload = JSON.stringify({ action: "ping" });
            console.log("📤 Enviando:", payload);
            tg.sendData(payload);
            document.getElementById('status').innerText = "Enviado!";
        }
        
        // Opcional: receber resposta do bot (se ele responder via reply_web_app_data)
        tg.onEvent('mainButtonClicked', () => {});
        console.log("WebApp pronto!");
    </script>
</body>
</html>
