<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container {
            text-align: center;
            padding: 24px;
            max-width: 400px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
        }
        .status {
            background: var(--tg-theme-secondary-bg-color, #e8e8e8);
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        .status p {
            margin: 8px 0;
            font-size: 16px;
        }
        .status strong {
            color: var(--tg-theme-button-color, #2c3e50);
        }
        button {
            background: var(--tg-theme-button-color, #2c3e50);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #888);
        }
        .success {
            color: #22c55e;
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✅</div>
        <h1>Web App Funcionando!</h1>
        <p>Seu domínio está configurado corretamente.</p>
        
        <div class="status">
            <p>👤 <strong>Usuário:</strong> <span id="userName">Carregando...</span></p>
            <p>🆔 <strong>ID:</strong> <span id="userId">Carregando...</span></p>
            <p>🔗 <strong>Username:</strong> <span id="userUsername">-</span></p>
        </div>
        
        <button id="closeBtn">Fechar Janela</button>
        <div class="footer">
            Powered by Telegram WebApp
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').innerText = user.first_name || 'Sem nome';
            document.getElementById('userId').innerText = user.id;
            document.getElementById('userUsername').innerText = user.username || 'Não definido';
        } else {
            document.getElementById('userName').innerText = 'Não autenticado';
            document.getElementById('userId').innerText = 'Abrir pelo Telegram';
        }
        
        document.getElementById('closeBtn').onclick = () => {
            tg.close();
        };
        
        tg.MainButton.setText("✅ Conectado com sucesso!");
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.showPopup({
                title: "✅ Sucesso!",
                message: "Seu Web App está funcionando perfeitamente!",
                buttons: [{type: "ok"}]
            });
        });
        
        tg.showPopup({
            title: "🎉 Web App Carregado!",
            message: "Clique em OK para continuar",
            buttons: [{type: "ok"}]
        });
    </script>
</body>
</html>
