<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Minha Loja</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 16px;
        }

        .balance-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--tg-theme-button-color, #2c3e50);
            color: white;
            border-radius: 12px;
            margin-top: 12px;
        }

        .balance-card span {
            font-size: 14px;
            opacity: 0.9;
        }

        .balance-card strong {
            font-size: 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #666);
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--tg-theme-button-color, #2c3e50);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .products-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-card, .cart-item, .profile-card, .affiliate-card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .product-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-info h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }

        .product-info p {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
        }

        .product-price {
            font-weight: bold;
            font-size: 18px;
            color: var(--tg-theme-button-color, #2c3e50);
        }

        .buy-btn, .add-cart-btn {
            background: var(--tg-theme-button-color, #2c3e50);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-quantity button {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: none;
            background: var(--tg-theme-button-color, #2c3e50);
            color: white;
            cursor: pointer;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #2c3e50);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--tg-theme-button-color, #2c3e50);
            color: var(--tg-theme-button-color, #2c3e50);
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
        }

        .link-box {
            background: var(--tg-theme-bg-color, #fff);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            margin: 8px 0;
        }

        .loading, .empty {
            text-align: center;
            padding: 40px;
            color: var(--tg-theme-hint-color, #888);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🛍️ MINHA LOJA</h2>
            <div class="balance-card">
                <span>💰 MEU SALDO</span>
                <strong id="userBalance">R$ 0,00</strong>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="loja">🛒 LOJA</button>
            <button class="tab-btn" data-tab="carrinho">🛜 CARRINHO <span id="cartBadge"></span></button>
            <button class="tab-btn" data-tab="perfil">👤 PERFIL</button>
        </div>

        <div id="loja" class="tab-content active">
            <div id="productsList" class="products-grid">
                <div class="loading">Carregando produtos...</div>
            </div>
        </div>

        <div id="carrinho" class="tab-content">
            <div id="cartList">
                <div class="empty">🛒 Seu carrinho está vazio</div>
            </div>
        </div>

        <div id="perfil" class="tab-content">
            <div class="profile-card">
                <h3>👤 MEUS DADOS</h3>
                <p><strong>🆔 ID:</strong> <span id="userId"></span></p>
                <p><strong>📛 Nome:</strong> <span id="userName"></span></p>
                <p><strong>💰 Saldo:</strong> <span id="profileBalance">R$ 0,00</span></p>
                <p><strong>💳 Total gasto:</strong> <span id="totalSpent">R$ 0,00</span></p>
                <button class="btn-primary" id="addBalanceBtn">➕ ADICIONAR SALDO</button>
            </div>

            <div class="affiliate-card">
                <h3>👥 AFILIADOS</h3>
                <p><strong>💰 Saldo afiliado:</strong> <span id="affBalance">R$ 0,00</span></p>
                <p><strong>👥 Indicações:</strong> <span id="totalReferrals">0</span></p>
                <button class="btn-secondary" id="copyAffLink">📋 COPIAR LINK</button>
            </div>

            <div class="profile-card">
                <h3>📦 MEUS PRODUTOS</h3>
                <div id="myProductsList"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const BOT_USERNAME = prompt("Digite o username do seu bot (sem @):", "seu_bot_aqui");
        
        let userData = null;
        let products = [];
        let cart = [];

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function sendToBot(method, params = {}) {
            params.chat_id = tg.initDataUnsafe.user?.id;
            
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            return response.json();
        }

        function loadCart() {
            const saved = localStorage.getItem(`cart_${tg.initDataUnsafe.user?.id}`);
            if (saved) {
                cart = JSON.parse(saved);
            } else {
                cart = [];
            }
            updateCartBadge();
            renderCart();
        }

        function saveCart() {
            localStorage.setItem(`cart_${tg.initDataUnsafe.user?.id}`, JSON.stringify(cart));
            updateCartBadge();
            renderCart();
        }

        function updateCartBadge() {
            const total = cart.reduce((sum, item) => sum + item.quantity, 0);
            const badge = document.getElementById('cartBadge');
            if (total > 0) {
                badge.innerText = ` (${total})`;
            } else {
                badge.innerText = '';
            }
        }

        function addToCart(productName, price) {
            const existing = cart.find(item => item.name === productName);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ name: productName, price: price, quantity: 1 });
            }
            saveCart();
            showToast(`✅ ${productName} adicionado ao carrinho!`);
        }

        function updateQuantity(productName, delta) {
            const index = cart.findIndex(item => item.name === productName);
            if (index !== -1) {
                cart[index].quantity += delta;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                saveCart();
            }
        }

        function renderCart() {
            const container = document.getElementById('cartList');
            if (!cart.length) {
                container.innerHTML = '<div class="empty">🛒 Seu carrinho está vazio</div>';
                return;
            }

            let subtotal = 0;
            let html = '';

            for (const item of cart) {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                html += `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            R$ ${item.price.toFixed(2)}
                        </div>
                        <div class="cart-quantity">
                            <button onclick="updateQuantity('${item.name}', -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity('${item.name}', 1)">+</button>
                        </div>
                    </div>
                `;
            }

            html += `
                <div class="cart-item">
                    <strong>💰 TOTAL:</strong>
                    <strong>R$ ${subtotal.toFixed(2)}</strong>
                </div>
                <button class="btn-primary" onclick="checkout()">✅ FINALIZAR COMPRA</button>
                <button class="btn-secondary" onclick="clearCart()">🗑️ LIMPAR CARRINHO</button>
            `;

            container.innerHTML = html;
        }

        function clearCart() {
            cart = [];
            saveCart();
        }

        async function checkout() {
            if (!cart.length) {
                showToast('❌ Carrinho vazio!');
                return;
            }

            if (!userData || userData.balance < subtotal) {
                tg.showPopup({
                    title: '❌ Saldo Insuficiente',
                    message: `Use /pix no bot para adicionar saldo`,
                    buttons: [{ type: 'ok' }]
                });
                return;
            }

            let message = "🛒 COMPRA VIA WEB APP\n\n";
            for (const item of cart) {
                message += `📦 ${item.name} x${item.quantity} = R$ ${(item.price * item.quantity).toFixed(2)}\n`;
            }
            message += `\n💰 TOTAL: R$ ${subtotal.toFixed(2)}`;
            message += `\n\nPara confirmar, digite /confirmar_compra`;

            tg.sendData(JSON.stringify({ action: 'checkout', cart: cart, total: subtotal }));
            tg.close();
        }

        async function loadUserData() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;
            
            document.getElementById('userId').innerText = user.id;
            document.getElementById('userName').innerText = user.first_name || user.username;
            
            const balance = localStorage.getItem(`balance_${user.id}`);
            if (balance) {
                userData = { balance: parseFloat(balance), total_spent: 0 };
                document.getElementById('userBalance').innerText = `R$ ${userData.balance.toFixed(2)}`;
                document.getElementById('profileBalance').innerText = `R$ ${userData.balance.toFixed(2)}`;
            }
        }

        async function loadProducts() {
            const productsData = localStorage.getItem('store_products');
            if (productsData) {
                products = JSON.parse(productsData);
                renderProducts(products);
                return;
            }
            
            document.getElementById('productsList').innerHTML = '<div class="loading">⚠️ Use /produtos no bot para sincronizar a loja</div>';
        }

        function renderProducts(productsList) {
            const container = document.getElementById('productsList');
            if (!productsList.length) {
                container.innerHTML = '<div class="empty">📦 Nenhum produto disponível</div>';
                return;
            }
            
            container.innerHTML = productsList.map(product => `
                <div class="product-card">
                    <div class="product-info">
                        <h3>${product.name}</h3>
                        <p>💰 R$ ${product.price.toFixed(2)}</p>
                    </div>
                    <button class="add-cart-btn" onclick="addToCart('${product.name}', ${product.price})">➕ CARRINHO</button>
                </div>
            `).join('');
        }

        async function loadMyProducts() {
            const purchases = localStorage.getItem(`purchases_${tg.initDataUnsafe.user?.id}`);
            const container = document.getElementById('myProductsList');
            if (!purchases) {
                container.innerHTML = '<div class="empty">Você não possui produtos ativos.</div>';
                return;
            }
            
            const productsList = JSON.parse(purchases);
            if (!productsList.length) {
                container.innerHTML = '<div class="empty">Você não possui produtos ativos.</div>';
                return;
            }
            
            container.innerHTML = productsList.map(product => `
                <div style="background:var(--tg-theme-secondary-bg-color); border-radius:10px; padding:12px; margin-bottom:8px;">
                    <strong>📦 ${product.category}</strong><br>
                    🔑 ${product.login}<br>
                    ${product.senha ? `🔒 ${product.senha}<br>` : ''}
                </div>
            `).join('');
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
                if (btn.dataset.tab === 'perfil') {
                    loadMyProducts();
                }
                if (btn.dataset.tab === 'carrinho') {
                    renderCart();
                }
            };
        });

        document.getElementById('addBalanceBtn').onclick = () => {
            tg.openInvoice({
                title: "Adicionar Saldo",
                description: "Recarregue seu saldo via PIX",
                payload: JSON.stringify({ action: "pix" }),
                provider_token: "",
                currency: "BRL",
                prices: [
                    { label: "R$ 5", amount: 500 },
                    { label: "R$ 10", amount: 1000 },
                    { label: "R$ 20", amount: 2000 },
                    { label: "R$ 50", amount: 5000 }
                ]
            });
        };

        document.getElementById('copyAffLink').onclick = () => {
            const link = `https://t.me/${BOT_USERNAME}?start=ref_${tg.initDataUnsafe.user?.id}`;
            tg.showPopup({ title: '🔗 Link copiado!', message: link });
        };

        loadUserData();
        loadProducts();
        loadCart();
    </script>
</body>
</html>
