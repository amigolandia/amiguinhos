<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Amigotst Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 16px;
            min-height: 100vh;
        }
        
        .card {
            background: var(--tg-theme-secondary-bg-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .balance {
            font-size: 32px;
            font-weight: bold;
            color: var(--tg-theme-button-color);
            margin: 10px 0;
        }
        
        button {
            background: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:active {
            opacity: 0.7;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--tg-theme-button-color);
            color: var(--tg-theme-button-color);
        }
        
        .row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        
        .row button {
            flex: 1;
            margin-top: 0;
        }
        
        h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        .info-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color);
            margin-top: 8px;
            text-align: center;
        }
        
        .user-name {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="user-name" id="user-name">Carregando...</div>
        <div class="balance" id="user-balance">💰 R$ 0,00</div>
        <div class="info-text">ID: <span id="user-id">-</span></div>
    </div>
    
    <div class="card">
        <h3>🎬 NETFLIX</h3>
        <div class="row">
            <button onclick="sendCommand('basic_link')">🟦 Basic<br><small>R$ 0,25</small></button>
            <button onclick="sendCommand('standard_link')">🟪 Standard<br><small>R$ 0,50</small></button>
            <button onclick="sendCommand('premium_link')">🟥 Premium<br><small>R$ 1,00</small></button>
        </div>
        <div class="row">
            <button onclick="sendCommand('premium_br_link')">🇧🇷 Premium BR<br><small>R$ 2,00</small></button>
            <button onclick="sendCommand('premium_en_link')">🇺🇸 Premium EN<br><small>R$ 1,00</small></button>
            <button onclick="sendCommand('premium_es_link')">🇪🇸 Premium ES<br><small>R$ 1,00</small></button>
        </div>
    </div>
    
    <div class="card">
        <h3>🛍️ MINHA CONTA</h3>
        <button onclick="sendCommand('saldo')">💰 Ver Saldo</button>
        <button onclick="sendCommand('add_balance')">➕ Adicionar Saldo (PIX)</button>
        <button onclick="sendCommand('meusprodutos')">📦 Meus Produtos</button>
    </div>
    
    <div class="card">
        <h3>👥 AFILIADOS</h3>
        <button onclick="sendCommand('mostrar_link_afiliado')">🔗 Meu Link de Indicação</button>
        <button onclick="sendCommand('ranking')">🏆 Ranking</button>
        <div class="row">
            <button onclick="sendCommand('sacar_afiliado 5')">💸 Sacar R$ 5</button>
            <button onclick="sendCommand('sacar_afiliado 10')">💸 Sacar R$ 10</button>
            <button onclick="sendCommand('sacar_afiliado 20')">💸 Sacar R$ 20</button>
        </div>
    </div>
    
    <div class="card">
        <h3>🎫 OUTROS</h3>
        <button onclick="sendCommand('loja_menu')">🛒 Ir para Loja</button>
        <button onclick="sendCommand('resgatar')">🎫 Resgatar Código</button>
        <button onclick="sendCommand('ticket')">📝 Abrir Ticket</button>
    </div>
    
    <div class="card">
        <h3>ℹ️ INFORMAÇÕES</h3>
        <button onclick="sendCommand('menu_termos')">📄 Termos e Regras</button>
        <button onclick="sendCommand('menu_group')">👥 Grupo de Clientes</button>
        <button onclick="openSupport()">👨‍💻 Suporte</button>
    </div>
    
    <div class="info-text">
        Clique em qualquer botão para executar o comando no chat
    </div>
    
    <script>
        const webApp = window.Telegram.WebApp;
        webApp.expand();
        webApp.ready();
        
        const user = webApp.initDataUnsafe.user || {};
        const BOT_USERNAME = "amigotstbot";
        
        // Exibir dados do usuário
        document.getElementById('user-name').innerText = user.first_name || user.username || "Usuário";
        document.getElementById('user-id').innerText = user.id || "?";
        
        function sendCommand(command) {
            let url = `https://t.me/${BOT_USERNAME}`;
            
            if (command === 'add_balance') {
                url += `?start=add_balance`;
            } else if (command === 'loja_menu') {
                url += `?start=loja_menu`;
            } else if (command === 'basic_link') {
                url += `?start=basic_link`;
            } else if (command === 'standard_link') {
                url += `?start=standard_link`;
            } else if (command === 'premium_link') {
                url += `?start=premium_link`;
            } else if (command === 'premium_br_link') {
                url += `?start=premium_br_link`;
            } else if (command === 'premium_en_link') {
                url += `?start=premium_en_link`;
            } else if (command === 'premium_es_link') {
                url += `?start=premium_es_link`;
            } else if (command === 'mostrar_link_afiliado') {
                url += `?start=mostrar_link_afiliado`;
            } else if (command === 'resgatar') {
                url += `?start=resgatar`;
            } else if (command === 'menu_termos') {
                url += `?start=menu_terms`;
            } else if (command === 'menu_group') {
                url += `?start=menu_group`;
            } else {
                url += `?start=${command}`;
            }
            
            webApp.openTelegramLink(url);
            webApp.close();
        }
        
        function openSupport() {
            webApp.openTelegramLink("https://t.me/script_amigo");
        }
        
        // Mostrar popup de boas-vindas na primeira vez
        if (!localStorage.getItem('welcome_shown')) {
            setTimeout(() => {
                webApp.showPopup({
                    title: "🎉 Bem-vindo!",
                    message: "Use os botões abaixo para acessar as funções do bot rapidamente!",
                    buttons: [{type: "ok"}]
                });
                localStorage.setItem('welcome_shown', 'true');
            }, 500);
        }
    </script>
</body>
</html>
