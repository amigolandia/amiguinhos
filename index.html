<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Teste WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Teste de Conexão</h1>
    <button onclick="sendData()">Enviar Ping</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendData() {
            tg.sendData(JSON.stringify({ action: "ping" }));
            alert("Enviado!");
        }
    </script>
</body>
</html>
